# Single container — two processes inside (Next.js + build WebSocket service)
# Service name must be `app` for Dokploy domain routing
services:
  app:
    build: .
    container_name: dockgen
    ports:
      - "${PORT:-5172}:${PORT:-5172}"           # Web UI
      - "${BUILD_SERVICE_PORT:-5173}:${BUILD_SERVICE_PORT:-5173}"  # Test Build WebSocket
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-5172}
      - BUILD_SERVICE_PORT=${BUILD_SERVICE_PORT:-5173}
      - NEXT_PUBLIC_BUILD_SERVICE_PORT=${BUILD_SERVICE_PORT:-5173}
      - BUILD_SERVICE_TOKEN=${BUILD_SERVICE_TOKEN:-}
      - BUILD_SERVICE_ORIGINS=${BUILD_SERVICE_ORIGINS:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
