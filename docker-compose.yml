services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docker-config-generator
    restart: unless-stopped
    ports:
      - "${PORT:-5173}:${PORT:-5173}"
    env_file:
      - .env
    environment:
      PORT: ${PORT:-5173}
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED:-1}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.environ.get(\\\"PORT\\\", \\\"5173\\\")}/api/health')\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
